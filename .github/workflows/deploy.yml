name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT_NAME: smf-docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npm run build

      - name: Ensure Cloudflare Pages project exists
        run: |
          if npx wrangler pages project list | awk '{print $1}' | grep -qx "$PROJECT_NAME"; then
            echo "Project '$PROJECT_NAME' already exists — skipping create."
          else
            echo "Project '$PROJECT_NAME' not found — creating."
            npx wrangler pages project create "$PROJECT_NAME" \
              --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy ./dist \
            --project-name="$PROJECT_NAME" \
            --branch=main
